name = "web2app"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"

[assets]
directory = "./frontend/dist"
binding = "ASSETS"
# SPA：未匹配的前端路由（如 /jobs/:id）经 env.ASSETS.fetch 回退到 index.html
not_found_handling = "single-page-application"

# 运行 `wrangler d1 create web2app` 后将输出的 database_id 替换下方占位符
[[d1_databases]]
binding = "DB"
database_name = "web2app"
database_id = "e45bfa13-525b-465c-8dbb-b1a716751b44"
migrations_dir = "worker/migrations"

[vars]
DEFAULT_BRANCH = "main"
MAX_UPLOAD_MB = "25"
GITHUB_OWNER = "shumengya"
GITHUB_REPO = "Web2App"